<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espionage Projects Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        p {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
            line-height: 1.6;
        }
        
        .projects {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .project-link {
            display: block;
            padding: 20px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .project-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        
        .project-description {
            font-size: 0.9em;
            opacity: 0.9;
            margin-top: 5px;
            font-weight: normal;
        }
        
        @media (min-width: 768px) {
            .projects {
                flex-direction: row;
                justify-content: space-between;
            }
            
            .project-link {
                flex: 1;
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕵️ Espionage Projects</h1>
        <p>Welcome to the centralized portal for all projects. Choose a project to explore:</p>
        
        <div class="projects">
            <a href="/hamraaz/" class="project-link">
                🪖 Hamraaz
                <div class="project-description">Indian Army Portal</div>
            </a>
            
            <a href="/sbi-login/" class="project-link">
                🏦 SBI Login
                <div class="project-description">State Bank of India</div>
            </a>
            
            <a href="/sparsh/" class="project-link">
                💼 Sparsh
                <div class="project-description">Pension Administration</div>
            </a>
        </div>
    </div>
</body>
</html>
