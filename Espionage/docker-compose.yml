services:
  espionage-portal:
    build: .
    ports:
      - "8001:80"
    # volumes:
      # Optional: Mount volumes for development (uncomment if needed)
      # - ./Hamraaz:/var/www/html/hamraaz
      # - ./SBI-Login:/var/www/html/sbi-login
      # - ./Sparsh:/app/sparsh
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    container_name: espionage-portal
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
