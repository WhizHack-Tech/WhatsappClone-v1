events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # Main server block
    server {
        listen 80;
        server_name localhost;
        
        # Root location - serve main portal page
        location = / {
            root /var/www/html;
            try_files /index.html =404;
        }
        
        # Proxy Hamraaz application
        location /hamraaz/ {
            # Remove the /hamraaz prefix when forwarding to the backend
            rewrite ^/hamraaz(.*)$ $1 break;
            
            proxy_pass http://localhost:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeout settings
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # Handle Hamraaz without trailing slash
        location = /hamraaz {
            return 301 /hamraaz/;
        }
        
        # Proxy SBI-Login application
        location /sbi-login/ {
            # Remove the /sbi-login prefix when forwarding to the backend
            rewrite ^/sbi-login(.*)$ $1 break;
            
            proxy_pass http://localhost:3002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeout settings
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # Handle SBI-Login without trailing slash
        location = /sbi-login {
            return 301 /sbi-login/;
        }
        
        # Proxy Sparsh application
        location /sparsh/ {
            # Remove the /sparsh prefix when forwarding to the backend
            rewrite ^/sparsh(.*)$ $1 break;
            
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeout settings
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # Handle API requests for all applications
        location ~ ^/(hamraaz|sbi-login|sparsh)/api/ {
            if ($uri ~ ^/hamraaz/api/(.*)$) {
                rewrite ^/hamraaz/api/(.*)$ /api/$1 break;
                proxy_pass http://localhost:3001;
            }
            if ($uri ~ ^/sbi-login/api/(.*)$) {
                rewrite ^/sbi-login/api/(.*)$ /api/$1 break;
                proxy_pass http://localhost:3002;
            }
            if ($uri ~ ^/sparsh/api/(.*)$) {
                rewrite ^/sparsh/api/(.*)$ /api/$1 break;
                proxy_pass http://localhost:3000;
            }
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Add CORS headers for API requests
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        }
        
        # Error pages
        error_page 404 /404.html;
        location = /404.html {
            root /var/www/html;
            internal;
        }
        
        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}