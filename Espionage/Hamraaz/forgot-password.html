<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Hamraaz</title>

    <link rel="icon" type="image/png" href="pictures/hamraaz-logo.png">
    <link rel="shortcut icon" type="image/png" href="pictures/hamraaz-logo.png">
    <link rel="stylesheet" href="/hamraaz/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo">
                    <span class="logo-text">Hamraaz</span>
                    <img src="/hamraaz/pictures/hamraaz-logo.png" alt="Hamraaz Logo">
                </div>
                <ul class="nav-menu">
                    <li><a href="/hamraaz/index.html" class="nav-link">Home</a></li>
                    <li><a href="/hamraaz/ro-login.html" class="nav-link">RO Login</a></li>
                    <li><a href="/hamraaz/unit-login.html" class="nav-link">Unit Login</a></li>
                    <li><a href="/hamraaz/personal-login.html" class="nav-link">Personal Login</a></li>
                    <li><a href="/hamraaz/signup.html" class="nav-link">Signup</a></li>
                    <li><a href="/hamraaz/forgot-password.html" class="nav-link active">Forgot Password</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="login-container">
        <form class="login-form" id="forgotPasswordForm">
            <div class="login-logo">
                <img src="/hamraaz/pictures/hamraaz-logo.png" alt="Hamraaz Logo" class="login-logo-img">
            </div>
            
            <h1 class="login-title">Forgot Password</h1>
            
            <div class="form-group">
                <input type="text" class="form-input" id="panNumber" placeholder="PAN Number in Capital" required>
            </div>
            
            <div class="captcha-container">
                <div class="captcha-image" id="captchaImage">9pL3k</div>
                <button type="button" class="refresh-btn" id="refreshCaptcha" title="Refresh Captcha">🔄</button>
            </div>
            
            <div class="form-group">
                <input type="text" class="form-input" id="captcha" placeholder="Captcha here" required>
            </div>
            
            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </main>

    <footer class="footer">
        <div class="footer-logos">
            <img src="/hamraaz/pictures/gov-india-logo.png" alt="Government of India" class="gov-logo">
            
            <img src="/hamraaz/pictures/azadi-ka-amrit-mahotsav.png" alt="Azadi Ka Amrit Mahotsav" class="azadi-logo">
            
            <img src="/hamraaz/pictures/digital-india-logo.png" alt="Digital India - Power to Empower" class="digital-india-logo">
            
            <img src="/hamraaz/pictures/gov-india-logo.png" alt="Government of India" class="gov-logo">
        </div>
    </footer>

    <script src="/hamraaz/script.js"></script>
</body>
</html>
