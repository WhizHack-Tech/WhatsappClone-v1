<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Login - Hamraaz</title>

    <link rel="icon" type="image/png" href="pictures/hamraaz-logo.png">
    <link rel="shortcut icon" type="image/png" href="pictures/hamraaz-logo.png">
    <link rel="stylesheet" href="styles.css?v=1.0.3">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo">
                    <span class="logo-text">Hamraaz</span>
                    <img src="pictures/hamraaz-logo.png" alt="Hamraaz Logo">
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="ro-login.html" class="nav-link">RO Login</a></li>
                    <li><a href="unit-login.html" class="nav-link active">Unit Login</a></li>
                    <li><a href="personal-login.html" class="nav-link">Personal Login</a></li>
                    <li><a href="signup.html" class="nav-link">Signup</a></li>
                    <li><a href="forgot-password.html" class="nav-link">Forgot Password</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="login-container">
        <form class="login-form" id="unitLoginForm">
            <div class="login-logo">
                <img src="pictures/hamraaz-logo.png" alt="Hamraaz Logo" class="login-logo-img">
            </div>
            
            <h1 class="login-title">Unit Login</h1>
            
            <div class="form-group">
                <input type="text" class="form-input" id="username" placeholder="Enter Your User Name" required>
            </div>
            
            <div class="captcha-container">
                <div class="captcha-image" id="captchaImage">rmgeW</div>
                <button type="button" class="refresh-btn" id="refreshCaptcha" title="Refresh Captcha">🔄</button>
            </div>
            
            <div class="form-group">
                <input type="text" class="form-input" id="captcha" placeholder="Enter Captcha" required>
            </div>
            
            <button type="submit" class="submit-btn">Request OTP</button>
            
            <a href="forgot-password.html" class="forgot-password-btn">Forgot Password</a>
        </form>
    </main>

    <footer class="footer">
        <div class="footer-logos">
            <img src="pictures/gov-india-logo.png" alt="Government of India" class="gov-logo">
            
            <img src="pictures/azadi-ka-amrit-mahotsav.png" alt="Azadi Ka Amrit Mahotsav" class="azadi-logo">
            
            <img src="pictures/digital-india-logo.png" alt="Digital India - Power to Empower" class="digital-india-logo">
            
            <img src="pictures/gov-india-logo.png" alt="Government of India" class="gov-logo">
        </div>
    </footer>

    <script src="script.js?v=1.0.3"></script>
</body>
</html>
